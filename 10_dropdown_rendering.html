<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Rendering</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 2rem; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #333; text-align: center; margin-bottom: 2rem; }
        .demo { background: white; padding: 2rem; border-radius: 8px; margin-bottom: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h3 { color: #667eea; margin-bottom: 1rem; }
        .dropdown { position: relative; margin-bottom: 1.5rem; }
        .dropdown-btn { width: 100%; padding: 0.75rem; background: white; border: 2px solid #ddd; border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .dropdown-btn:hover { border-color: #667eea; }
        .dropdown-btn.active { border-color: #667eea; background: #f0f3ff; }
        .dropdown-menu { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 2px solid #667eea; border-top: none; max-height: 0; overflow: hidden; transition: max-height 0.3s; z-index: 100; }
        .dropdown-menu.show { max-height: 200px; }
        .dropdown-item { padding: 0.75rem; cursor: pointer; border-bottom: 1px solid #f0f0f0; transition: 0.2s; }
        .dropdown-item:hover { background: #f0f3ff; color: #667eea; }
        .dropdown-item.selected { background: #667eea; color: white; }
        .selected-text { margin-top: 1rem; padding: 0.75rem; background: #f9f9f9; border-radius: 5px; color: #666; }
        .tag { display: inline-block; background: #667eea; color: white; padding: 0.3rem 0.7rem; border-radius: 20px; margin-right: 0.5rem; margin-bottom: 0.5rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dropdown Examples</h1>
        
        <div class="demo">
            <h3>Single Select</h3>
            <div class="dropdown">
                <button class="dropdown-btn" onclick="toggleDropdown('single', event)">
                    <span>Select Framework</span>
                    <span>▼</span>
                </button>
                <div class="dropdown-menu" id="singleDropdown">
                    <div class="dropdown-item" onclick="selectSingle('React', event)">React</div>
                    <div class="dropdown-item" onclick="selectSingle('Vue.js', event)">Vue.js</div>
                    <div class="dropdown-item" onclick="selectSingle('Angular', event)">Angular</div>
                </div>
            </div>
            <div class="selected-text" id="singleSelected">No selection</div>
        </div>
        
        <div class="demo">
            <h3>Multi-Select</h3>
            <div class="dropdown">
                <button class="dropdown-btn" onclick="toggleDropdown('multi', event)">
                    <span>Select Languages</span>
                    <span>▼</span>
                </button>
                <div class="dropdown-menu" id="multiDropdown">
                    <div class="dropdown-item" onclick="toggleMulti('JavaScript', event)">🔲 JavaScript</div>
                    <div class="dropdown-item" onclick="toggleMulti('Python', event)">🔲 Python</div>
                    <div class="dropdown-item" onclick="toggleMulti('Java', event)">🔲 Java</div>
                </div>
            </div>
            <div class="selected-text" id="multiSelected">No selection</div>
        </div>
        
        <div class="demo">
            <h3>Searchable Dropdown</h3>
            <div class="dropdown">
                <button class="dropdown-btn" onclick="toggleDropdown('search', event)">
                    <span>Select Country</span>
                    <span>▼</span>
                </button>
                <div class="dropdown-menu" id="searchDropdown">
                    <input type="text" id="searchInput" placeholder="Search..." style="width: 100%; padding: 0.75rem; border: none; border-bottom: 1px solid #ddd;" onkeyup="filterDropdown()">
                    <div class="dropdown-item" onclick="selectItem('India', event)">India</div>
                    <div class="dropdown-item" onclick="selectItem('Japan', event)">Japan</div>
                    <div class="dropdown-item" onclick="selectItem('USA', event)">USA</div>
                    <div class="dropdown-item" onclick="selectItem('Canada', event)">Canada</div>
                </div>
            </div>
            <div class="selected-text" id="searchSelected">No selection</div>
        </div>
    </div>

    <script>
        const multiSelected = new Set();

        function toggleDropdown(type, event) {
            event.stopPropagation();
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.dropdown-btn').forEach(b => b.classList.remove('active'));
            const dropdown = document.getElementById(type + 'Dropdown');
            dropdown.classList.add('show');
            event.target.closest('.dropdown-btn').classList.add('active');
        }

        function selectSingle(value, event) {
            event.stopPropagation();
            document.getElementById('singleSelected').textContent = value;
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.dropdown-btn').forEach(b => b.classList.remove('active'));
        }

        function toggleMulti(value, event) {
            event.stopPropagation();
            if (multiSelected.has(value)) {
                multiSelected.delete(value);
            } else {
                multiSelected.add(value);
            }
            const tags = Array.from(multiSelected).map(v => `<span class="tag">${v}</span>`).join('');
            document.getElementById('multiSelected').innerHTML = tags || 'No selection';
        }

        function selectItem(value, event) {
            event.stopPropagation();
            document.getElementById('searchSelected').textContent = value;
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.dropdown-btn').forEach(b => b.classList.remove('active'));
        }

        function filterDropdown() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('#searchDropdown .dropdown-item').forEach(item => {
                if (item.textContent.toLowerCase().includes(term)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        document.addEventListener('click', () => {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.dropdown-btn').forEach(b => b.classList.remove('active'));
        });
    </script>
</body>
</html>
