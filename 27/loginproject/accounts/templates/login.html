<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial; text-align:center; padding:50px; }
        input { margin:10px; padding:5px; }
    </style>
</head>
<body>

<h2>Login Page</h2>

<form method="post">
    {% csrf_token %}
    Username: <input type="text" name="username"><br>
    Password: <input type="password" name="password"><br>
    <button type="submit">Login</button>
</form>

</body>
</html>
