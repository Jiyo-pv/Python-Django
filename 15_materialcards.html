<!DOCTYPE html>
<html>

<head>
    <title>Material Design Page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/materialize-css@1.0.0/dist/css/materialize.min.css">
</head>

<body class="container">

    <h3>Material Design Example</h3>
    <p>This page demonstrates Material Design components such as cards and buttons.</p>

    <div class="row">

        <div class="col s6">
            <div class="card">
                <div class="card-content">
                    <span class="card-title">Profile Card</span>
                    <p>This is a simple Material Design card layout.</p>
                </div>
                <div class="card-action">
                    <a class="btn">View</a>
                </div>
            </div>
        </div>

        <div class="col s6">
            <div class="card">
                <div class="card-content">
                    <span class="card-title">Information Card</span>
                    <p>Material Design provides modern UI elements.</p>
                </div>
                <div class="card-action">
                    <a class="btn green">Action</a>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
