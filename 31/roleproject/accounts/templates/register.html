<h2>Register</h2>

<form method="post">
    {% csrf_token %}
    Username: <input type="text" name="username"><br>
    Password: <input type="password" name="password"><br>

    Role:
    <select name="role">
        <option value="admin">Admin</option>
        <option value="user">User</option>
    </select><br>

    <button type="submit">Register</button>
</form>

<a href="/">Login</a>
