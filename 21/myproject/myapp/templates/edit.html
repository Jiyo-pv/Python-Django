<h2>Edit Student</h2>

<form method="post">
    {% csrf_token %}
    Name: <input type="text" name="name" value="{{ student.name }}"><br>
    Age: <input type="number" name="age" value="{{ student.age }}"><br>
    Grade: <input type="text" name="grade" value="{{ student.grade }}"><br>
    <button type="submit">Update</button>
</form>
