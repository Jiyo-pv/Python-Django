<!DOCTYPE html>
<html>

<head>
    <title>Responsive Login / Register</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f2f2f2;
        }

        .card {
            max-width: 420px;
            margin: auto;
            margin-top: 40px;
            padding: 20px;
        }

        .toggle-btn {
            cursor: pointer;
            color: #0d6efd;
        }

        .toggle-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <!-- ✅ RESPONSIVE NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">My Application</a>

            <!-- Mobile Toggle Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Collapsible Menu -->
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- ✅ CARD CONTAINER -->
    <div class="card shadow">
        <h3 class="text-center mb-3">User Account</h3>
        <!-- LOGIN FORM -->
        <div id="loginForm">
            <h5>Login</h5>
            <label>Email</label>
            <input class="form-control mb-2">
            <label>Password</label>
            <input type="password" class="form-control mb-3">
            <button class="btn btn-primary w-100">Login</button>
            <p class="text-center mt-3">
                Don't have an account?
                <span class="toggle-btn" onclick="showRegister()">Register</span>
            </p>
        </div>
        <!-- REGISTER FORM -->
        <div id="registerForm" style="display:none;">
            <h5>Register</h5>
            <label>Name</label>
            <input class="form-control mb-2">
            <label>Email</label>
            <input class="form-control mb-2">
            <label>Password</label>
            <input type="password" class="form-control mb-3">
            <button class="btn btn-success w-100">Create Account</button>
            <p class="text-center mt-3">
                Already have an account?
                <span class="toggle-btn" onclick="showLogin()">Login</span>
            </p>
        </div>
    </div>
    <!-- Bootstrap JS (Required for Navbar Toggle) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showRegister() {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("registerForm").style.display = "block";
        }
        function showLogin() {
            document.getElementById("registerForm").style.display = "none";
            document.getElementById("loginForm").style.display = "block";
        }
    </script>
</body>

</html>
